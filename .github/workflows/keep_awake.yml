name: Empty Commit Every 5 Hours

on:
  schedule:
    # Runs every 5 hours
    - cron: '0 */5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  empty-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create Empty Commit
        run: |
          git commit --allow-empty -m "chore: automated keep-alive $(date -u '+%Y-%m-%d %H:%M UTC')"

      - name: Push Changes
        run: |
          git push origin HEAD:${{ github.ref_name }}
