name: Keep Streamlit App Awake

on:
  schedule:
    # Runs twice daily (00:00 UTC and 12:00 UTC)
    - cron: '0 0,12 * * *'

  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Streamlit App
        run: |
          curl -I https://virtualscreening.streamlit.app/
